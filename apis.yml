aid: wunderground
name: Weather Underground
description: >
  Weather Underground operates a personal weather station network of 250,000+
  stations worldwide, providing hyperlocal weather data via a REST API. The
  PWS API (hosted at api.weather.com) offers authenticated access to current
  conditions, historical observations, 5-day forecasts, and location lookup
  for registered station contributors. API keys are free for PWS owners who
  upload data to the network.
