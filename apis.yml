apis:
  - name: Weather Underground PWS API
    description: >
      REST API for Personal Weather Station data hosted at api.weather.com.
      Provides current conditions, daily summaries, hourly and daily historical
      records, 5-day forecasts, and station location lookup. Access requires a
      free API key issued to registered PWS contributors.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.wunderground.com/member/api-keys
    baseURL: https://api.weather.com
    tags:
